server:
  port: 8081

spring:
  r2dbc:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    pool:
      initial-size: 5
      max-size: 50
      max-acquire-time: 60s
      max-create-connection-time: 5s
      max-idle-time: 30m
      validation-query: SELECT 1

  flyway:
    enabled: true
    execute-in-transaction: true
    baseline-on-migrate: true
    validate-on-migrate: true
    locations: classpath:db/migration
    url: ${DB_URL_FLYWAY}
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  threads:
    virtual:
      enabled: true

friomamut:
  api:
    base-url: ${FRIOMAMUT_URL}
    token: ${FRIOMAMUT_TOKEN}
